<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación - Bertha Lisbeth</title>

<style>
*{
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    font-family: 'Arial Black', sans-serif;
    background: url("Kimetsu_no_Yaiba.webp") no-repeat center center fixed;
    background-size: cover;
    overflow-x: hidden;
    color: white;
    text-align: center;
}

/* 🔥 Pantalla inicial */
.intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
    animation: introFade 3.5s forwards;
}

.intro h1 {
    color: #ff3c00;
    font-size: 2rem;
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { opacity: 0.3; }
    50% { opacity: 1; }
    100% { opacity: 0.3; }
}

@keyframes introFade {
    0% { opacity: 1; }
    80% { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
}

/* Capa oscura */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
    z-index: 0;
}

/* Contenido principal */
.container {
    position: relative;
    z-index: 2;
    padding: 20px;
    max-width: 600px;
    margin: auto;
    margin-top: 8vh;
    opacity: 0;
    transform: scale(0.9);
    animation: contentAppear 2s ease forwards;
    animation-delay: 3.2s;
}

@keyframes contentAppear {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* Títulos */
h1 {
    font-size: clamp(1.8rem, 6vw, 3rem);
    color: #ff3c00;
    animation: glow 2s infinite alternate;
}

h2 {
    font-size: clamp(1.5rem, 5vw, 2.2rem);
    color: #ffae00;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ff3c00; }
    to { text-shadow: 0 0 30px #ffae00; }
}

.info {
    font-size: clamp(1rem, 4vw, 1.3rem);
    margin-top: 25px;
    line-height: 1.6em;
}

button {
    margin-top: 20px;
    padding: 18px;
    width: 100%;
    max-width: 320px;
    font-size: 1.1rem;
    background: linear-gradient(45deg, #ff3c00, #ffae00);
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 14px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* 🔥 Partículas */
.particle {
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    animation: rise linear infinite;
    opacity: 0.8;
}

@keyframes rise {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro">
    <h1>🔥 Preparando la misión... 🔥</h1>
</div>

<div class="overlay"></div>

<div class="container">
    <h1>🔥 ¡Invitación Especial! 🔥</h1>
    <h2>Bertha Lisbeth cumple 12 años</h2>

    <div class="info">
        🗓 Domingo 8 de marzo de 2026 <br>
        🕒 2:30 PM <br><br>
        📍 Villa MALCOR <br>
        0 avenida "C", Chio Talpetate 0-59 <br>
        Zona 8, Cobán, Alta Verapaz
    </div>

    <button onclick="confirmar()">⚔️ Confirmar Asistencia</button>
    <button onclick="activarMusica()">🎵 Activar Música</button>
</div>

<audio id="musica" src="musica.mp3" loop></audio>

<script>
// Partículas
for (let i = 0; i < 40; i++) {
    let particle = document.createElement("div");
    particle.classList.add("particle");
    particle.style.left = Math.random() * 100 + "vw";
    particle.style.animationDuration = (Math.random() * 3 + 2) + "s";
    particle.style.background = ["#ff3c00","#ffae00","#ff0000"][Math.floor(Math.random()*3)];
    document.body.appendChild(particle);
}

// WhatsApp
function confirmar() {
    window.open("https://wa.me/50256353511?text=Confirmo%20mi%20asistencia%20al%20cumpleaños%20de%20Bertha%20Lisbeth 🔥", "_blank");
}

// Música
function activarMusica(){
    document.getElementById("musica").play();
}
</script>

</body>
</html>
